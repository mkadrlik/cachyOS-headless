name: Mirror to GitHub

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

jobs:
  mirror:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitHub (mirror)
        run: |
          git remote remove github 2>/dev/null || true
          git remote add github "https://${GHCR_TOKEN}@github.com/mkadrlik/cachyOS-headless.git"
          # SUPPLY CHAIN GUARD: Force push only. Never fetch from GitHub.
          # Gitea is source of truth. GitHub is read-only replica.
          git push github main --force --tags
          echo "Mirrored to GitHub successfully"
