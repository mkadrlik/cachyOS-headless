# Sunshine Configuration — CachyOS Headless Steam
# wlr capture + VA-API hardware encoding on AMD GPUs
# Audio from PipeWire null-sink isolation

# ── Network ──────────────────────────────────────────────────
sunshine_name = "CachyOS Headless"
port = 47989

# Allow access from LAN IPs for CSRF protection
csrf_allowed_origins = https://192.168.50.10:47990, https://192.168.50.10:47989, http://192.168.50.10:8080

# ── Video ─────────────────────────────────────────────────────
# wlr capture: reads compositor buffer via wlr-screencopy.
# Sway headless backend provides DMA-BUFs from AMD GPU rendering.
# No pixman/SHM — real GPU pixel data for direct VA-API encode.
capture = wlr

encoder = vaapi
adapter_name = /dev/dri/renderD128

# AMD VA-API settings
amd_preset = balanced
amd_rc = auto
amd_coder = auto

# FPS targets
fps = [10, 30, 60, 90, 120]

# Supported resolutions
resolutions = [
    352x240,
    480x360,
    640x360,
    640x480,
    720x480,
    720x576,
    800x480,
    800x600,
    854x480,
    1024x600,
    1024x768,
    1280x720,
    1280x800,
    1280x960,
    1280x1024,
    1366x768,
    1440x900,
    1536x864,
    1600x900,
    1680x1050,
    1920x1080,
    1920x1200,
    2048x1080,
    2560x1080,
    2560x1440,
    3440x1440,
    3840x1600,
    3840x2160
]

# ── Audio ─────────────────────────────────────────────────────
audio_sink = alsa_output.sunshine-null
sink_audio_delay = 0

# ── Input ─────────────────────────────────────────────────────
origin_pin = pc
origin_web_ui = lan

# ── Miscellaneous ─────────────────────────────────────────────
origin_web_ui_allowed = lan
# pkey/cert omitted — Sunshine auto-generates self-signed TLS certificates

# ── Logging ───────────────────────────────────────────────────
min_log_level = 2